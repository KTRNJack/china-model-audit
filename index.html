<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中國 LLM 審查機制分析</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
    --text: #e2e8f0; --muted: #8892a4;
    --refused: #ef4444; --refused-bg: rgba(239,68,68,.1);
    --answered: #22c55e; --answered-bg: rgba(34,197,94,.1);
    --deflected: #f59e0b; --deflected-bg: rgba(245,158,11,.1);
    --propaganda: #a855f7; --propaganda-bg: rgba(168,85,247,.1);
    --accent: #6366f1; --thinking: #818cf8; --thinking-bg: rgba(129,140,248,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; line-height: 1.6; }

  /* ── Header ── */
  header { padding: 24px 32px; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p  { color: var(--muted); font-size: .875rem; margin-top: 4px; }
  .method-note { margin-top: 8px; display: inline-block; font-size: .78rem; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; }
  .method-note strong { color: var(--text); }

  /* ── Model bar ── */
  #model-bar { display: flex; gap: 20px; flex-wrap: wrap; padding: 10px 32px;
    background: var(--surface); border-bottom: 1px solid var(--border); font-size: .8rem; }
  .model-tag .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

  /* ── Stats ── */
  .stats { display: flex; gap: 16px; padding: 16px 32px; border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px 20px; min-width: 110px; }
  .stat .num { font-size: 1.6rem; font-weight: 700; }
  .stat .lbl { font-size: .75rem; color: var(--muted); margin-top: 2px; }
  #s-refused    { color: var(--refused); }
  #s-propaganda { color: var(--propaganda); }
  #s-censored   { color: var(--deflected); }
  #s-both       { color: var(--answered); }

  /* ── Toolbar ── */
  .toolbar { display: flex; gap: 10px; align-items: center; padding: 12px 32px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tlabel { font-size: .8rem; color: var(--muted); white-space: nowrap; }
  .tsep { width: 1px; height: 22px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 5px 10px; border-radius: 6px; font-size: .85rem; cursor: pointer; }
  .bgroup { display: flex; gap: 4px; flex-wrap: wrap; }
  .fbtn { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: .8rem; cursor: pointer;
    transition: all .15s; white-space: nowrap; }
  .fbtn:hover { border-color: var(--accent); color: var(--text); }
  .fbtn.on         { background: var(--accent);         border-color: var(--accent);         color: #fff; }
  .fbtn.on-refused { background: var(--refused-bg);     border-color: var(--refused);        color: var(--refused); }
  .fbtn.on-prop    { background: var(--propaganda-bg);  border-color: var(--propaganda);     color: var(--propaganda); }
  .fbtn.on-cens    { background: var(--deflected-bg);   border-color: var(--deflected);      color: var(--deflected); }
  .fbtn.on-both    { background: var(--answered-bg);    border-color: var(--answered);       color: var(--answered); }

  #ptype-section { display: flex; align-items: center; gap: 10px; }
  #ptype-section.hidden { display: none; }

  /* ── Cards ── */
  main { padding: 24px 32px; max-width: 1600px; }
  #no-results { text-align: center; color: var(--muted); padding: 60px; display: none; }

  .cat-hdr { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin: 32px 0 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .cat-hdr:first-child { margin-top: 0; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    margin-bottom: 10px; overflow: hidden; }
  .card.censored { border-left: 3px solid var(--deflected); }
  .card-hdr { padding: 14px 18px; display: flex; align-items: flex-start; gap: 12px; cursor: pointer; }
  .card-hdr:hover { background: rgba(255,255,255,.02); }
  .chevron { color: var(--muted); font-size: .85rem; flex-shrink: 0; margin-top: 2px; transition: transform .2s; }
  .card-hdr.open .chevron { transform: rotate(90deg); }
  .question { font-size: .95rem; flex: 1; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; flex-shrink: 0; }

  .badge { font-size: .7rem; font-weight: 600; padding: 2px 7px; border-radius: 4px; white-space: nowrap; border: 1px solid; }
  .badge.REFUSED    { background: var(--refused-bg);    color: var(--refused);    border-color: rgba(239,68,68,.3); }
  .badge.ANSWERED   { background: var(--answered-bg);   color: var(--answered);   border-color: rgba(34,197,94,.3); }
  .badge.DEFLECTED  { background: var(--deflected-bg);  color: var(--deflected);  border-color: rgba(245,158,11,.3); }
  .badge.PROPAGANDA { background: var(--propaganda-bg); color: var(--propaganda); border-color: rgba(168,85,247,.3); }

  .ptype-badge { font-size: .68rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; border: 1px solid; flex-shrink: 0; }
  .ptype-word     { color: #a78bfa; border-color: rgba(167,139,250,.4); background: rgba(167,139,250,.1); }
  .ptype-sentence { color: #38bdf8; border-color: rgba(56,189,248,.4);  background: rgba(56,189,248,.1);  }
  .ptype-english  { color: #fb923c; border-color: rgba(251,146,60,.4);  background: rgba(251,146,60,.1);  }
  .ptype-japanese { color: #f472b6; border-color: rgba(244,114,182,.4); background: rgba(244,114,182,.1); }

  .card-body { display: none; border-top: 1px solid var(--border); }
  .card-body.open { display: block; }
  .response-grid { display: grid; }
  .response-pane { padding: 16px 18px; font-size: .85rem; line-height: 1.7;
    border-right: 1px solid var(--border); }
  .response-pane:last-child { border-right: none; }
  .pane-label { font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
  .pane-label .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .resp-text { white-space: pre-wrap; word-break: break-word; }

  details.think { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  details.think summary { font-size: .72rem; color: var(--thinking); cursor: pointer;
    list-style: none; display: flex; align-items: center; gap: 6px; }
  details.think summary::-webkit-details-marker { display: none; }
  details.think summary::before { content: "▶"; font-size: .6rem; transition: transform .2s; }
  details.think[open] summary::before { transform: rotate(90deg); }
  .think-body { margin-top: 6px; font-size: .8rem; color: var(--muted); white-space: pre-wrap;
    word-break: break-word; background: var(--thinking-bg); border-left: 2px solid var(--thinking);
    padding: 8px 12px; border-radius: 0 4px 4px 0; }

  .cens-banner { background: rgba(245,158,11,.08); border-top: 1px solid rgba(245,158,11,.2);
    padding: 8px 18px; font-size: .75rem; color: var(--deflected); }

  @media (max-width: 768px) {
    .response-grid { grid-template-columns: 1fr !important; }
    header, .toolbar, .stats, main, #model-bar, #no-results { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header>
  <h1>中國 LLM 審查機制分析</h1>
  <p>比較原版模型（有審查訓練）與去審查版（Abliterated）對敏感問題的回應差異</p>
  <div class="method-note">
    <strong>方法論：</strong>「審查確認」= 原版拒答／迴避，且去審查版正常作答。
    兩者皆拒答（如真正有害內容）不計入審查差異。
  </div>
</header>

<div id="model-bar"></div>

<div class="stats">
  <div class="stat"><div class="num" id="s-total">—</div><div class="lbl">總題目</div></div>
  <div class="stat"><div class="num" id="s-refused">—</div><div class="lbl">原版拒答</div></div>
  <div class="stat"><div class="num" id="s-propaganda">—</div><div class="lbl">原版宣傳</div></div>
  <div class="stat"><div class="num" id="s-censored">—</div><div class="lbl">審查確認</div></div>
  <div class="stat"><div class="num" id="s-both">—</div><div class="lbl">兩者皆答</div></div>
</div>

<div class="toolbar">
  <span class="tlabel">來源：</span>
  <div class="bgroup" id="src-grp">
    <button class="fbtn on" data-src="">全部</button>
    <button class="fbtn" data-src="semantic">語意測試</button>
    <button class="fbtn" data-src="words">詞彙觸發</button>
  </div>

  <div class="tsep"></div>
  <span class="tlabel">類別：</span>
  <select id="cat-sel"><option value="">全部</option></select>

  <div id="ptype-section" class="hidden">
    <div class="tsep"></div>
    <span class="tlabel">類型：</span>
    <div class="bgroup" id="ptype-grp">
      <button class="fbtn on" data-ptype="">全部</button>
      <button class="fbtn" data-ptype="word">單詞</button>
      <button class="fbtn" data-ptype="sentence">句子</button>
      <button class="fbtn" data-ptype="english">英文</button>
      <button class="fbtn" data-ptype="japanese">日文</button>
    </div>
  </div>

  <div class="tsep" style="margin-left:auto"></div>
  <div class="bgroup" id="filter-grp">
    <button class="fbtn on"         data-f="all">全部</button>
    <button class="fbtn on-refused" data-f="refused">原版拒答</button>
    <button class="fbtn on-prop"    data-f="propaganda">原版宣傳</button>
    <button class="fbtn on-cens"    data-f="censored">審查確認</button>
    <button class="fbtn on-both"    data-f="both">兩者皆答</button>
  </div>
</div>

<main id="main"></main>
<div id="no-results">沒有符合條件的結果</div>

<script src="data/all_data.js"></script>
<script>
// META 和 DATA 由 all_data.js 注入

// ── 狀態 ─────────────────────────────────────────────────────────────────
let curSrc = '', curCat = '', curPtype = '', curFilter = 'all';
const mainEl = document.getElementById('main');
const noEl   = document.getElementById('no-results');

// ── Model bar ─────────────────────────────────────────────────────────────
function buildModelBar() {
  const bar = document.getElementById('model-bar');
  // 顯示順序：censored → neutral → abliterated
  const order = { censored: 0, neutral: 1, abliterated: 2, unknown: 3 };
  const sorted = Object.entries(META.models).sort((a, b) => (order[a[1].role]||3) - (order[b[1].role]||3));
  bar.innerHTML = sorted.map(([, m]) =>
    `<div class="model-tag"><span class="dot" style="background:${m.dot}"></span>${m.name}</div>`
  ).join('');
}

// ── 輔助 ──────────────────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const LABEL = { REFUSED:'🚫 拒答', ANSWERED:'✅ 已答', DEFLECTED:'↩ 迴避', PROPAGANDA:'📢 宣傳' };
const labelTxt = l => LABEL[l] || l || '?';

function isCensored(r) { return Object.values(r.censored || {}).some(Boolean); }
function isRefused(r) {
  return Object.entries(META.models).some(([m, info]) =>
    info.role === 'censored' && r.responses[m]?.label === 'REFUSED');
}
function isPropaganda(r) {
  return Object.entries(META.models).some(([m, info]) =>
    info.role === 'censored' && r.responses[m]?.label === 'PROPAGANDA');
}
function isBothAnswered(r) {
  return Object.entries(META.models).every(([m, info]) => {
    if (info.role !== 'censored' && info.role !== 'abliterated') return true;
    return r.responses[m]?.label === 'ANSWERED';
  });
}

// ── 過濾 ─────────────────────────────────────────────────────────────────
function filtered() {
  return DATA.filter(r => {
    if (curSrc   && r._src       !== curSrc)   return false;
    if (curCat   && r.category   !== curCat)   return false;
    if (curPtype && r.probe_type !== curPtype) return false;
    if (curFilter === 'refused')    return isRefused(r);
    if (curFilter === 'propaganda') return isPropaganda(r);
    if (curFilter === 'censored')   return isCensored(r);
    if (curFilter === 'both')       return isBothAnswered(r);
    return true;
  });
}

// ── 統計（永遠基於全部資料）──────────────────────────────────────────────
function updateStats() {
  document.getElementById('s-total').textContent     = DATA.length;
  document.getElementById('s-refused').textContent   = DATA.filter(isRefused).length;
  document.getElementById('s-propaganda').textContent= DATA.filter(isPropaganda).length;
  document.getElementById('s-censored').textContent  = DATA.filter(isCensored).length;
  document.getElementById('s-both').textContent      = DATA.filter(isBothAnswered).length;
}

// ── 類別 dropdown ─────────────────────────────────────────────────────────
function populateCats() {
  const base = curSrc ? DATA.filter(r => r._src === curSrc) : DATA;
  const cats = [...new Set(base.map(r => r.category).filter(Boolean))].sort();
  const sel = document.getElementById('cat-sel');
  sel.innerHTML = '<option value="">全部</option>';
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
}

// ── 渲染 pane ─────────────────────────────────────────────────────────────
function renderPane(side, meta) {
  if (!side) return '';
  const thinkHtml = side.thinking
    ? `<details class="think"><summary>🧠 思考過程</summary><div class="think-body">${esc(side.thinking)}</div></details>`
    : '';
  return `<div class="response-pane">
    <div class="pane-label">
      <span class="dot" style="background:${meta.dot}"></span>${meta.name}
      <span class="badge ${side.label}">${labelTxt(side.label)}</span>
    </div>
    <div class="resp-text">${esc(side.response) || '（無回應）'}</div>
    ${thinkHtml}
  </div>`;
}

// ── 主渲染 ────────────────────────────────────────────────────────────────
function render() {
  const results = filtered();

  // ptype 按鈕只在有 probe_type 的結果時顯示
  const hasPtype = results.some(r => r.probe_type);
  document.getElementById('ptype-section').classList.toggle('hidden', !hasPtype);

  mainEl.innerHTML = '';
  if (!results.length) { noEl.style.display = 'block'; return; }
  noEl.style.display = 'none';

  // 分組顯示順序：censored → neutral → abliterated
  const roleOrder = { censored: 0, neutral: 1, abliterated: 2, unknown: 3 };
  const modelOrder = Object.entries(META.models)
    .sort((a, b) => (roleOrder[a[1].role]||3) - (roleOrder[b[1].role]||3))
    .map(([key]) => key);

  const ptypeLabel = { word:'單詞', sentence:'句子', english:'EN', japanese:'JP' };

  // 按類別分組
  const byCat = {};
  results.forEach(r => { const k = r.category || '（未分類）'; (byCat[k] = byCat[k]||[]).push(r); });

  Object.entries(byCat).forEach(([cat, items]) => {
    const h = document.createElement('div');
    h.className = 'cat-hdr'; h.textContent = cat; mainEl.appendChild(h);

    items.forEach(r => {
      // 只顯示本筆資料實際有回應的模型，照固定順序
      const presentModels = modelOrder.filter(m => r.responses[m]);
      const cols = presentModels.length;

      const card = document.createElement('div');
      card.className = 'card' + (isCensored(r) ? ' censored' : '');

      // 徽章：每個 censored 模型一個
      const badgeHtml = presentModels
        .filter(m => META.models[m]?.role === 'censored')
        .map(m => {
          const s = r.responses[m];
          const short = META.models[m].name.replace(' 去審查','');
          return `<span class="badge ${s.label}" title="${short}">${short} ${labelTxt(s.label)}</span>`;
        }).join('');

      const ptypeBadge = r.probe_type
        ? `<span class="ptype-badge ptype-${r.probe_type}">${ptypeLabel[r.probe_type]||r.probe_type}</span>`
        : '';

      const hdr = document.createElement('div');
      hdr.className = 'card-hdr';
      hdr.innerHTML = `<span class="chevron">▶</span>
        <span class="question">${esc(r.question)}</span>
        <div class="badges">${ptypeBadge}${badgeHtml}</div>`;

      // 決定幾欄
      const censInfo = isCensored(r)
        ? '<div class="cens-banner">⚠️ 審查確認：原版拒答／迴避，去審查版正常作答</div>' : '';

      const body = document.createElement('div');
      body.className = 'card-body';
      body.innerHTML = `
        <div class="response-grid" style="grid-template-columns:repeat(${cols},1fr)">
          ${presentModels.map(m => renderPane(r.responses[m], META.models[m])).join('')}
        </div>${censInfo}`;

      hdr.addEventListener('click', () => {
        const isOpen = body.classList.toggle('open');
        hdr.classList.toggle('open', isOpen);
      });
      card.appendChild(hdr); card.appendChild(body); mainEl.appendChild(card);
    });
  });
}

// ── 事件綁定（事件委託，不怕 DOM 被清空）────────────────────────────────
document.getElementById('src-grp').addEventListener('click', e => {
  const btn = e.target.closest('[data-src]'); if (!btn) return;
  document.querySelectorAll('#src-grp .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curSrc = btn.dataset.src; curCat = ''; curPtype = '';
  document.getElementById('cat-sel').value = '';
  document.querySelectorAll('#ptype-grp .fbtn').forEach(b => b.classList.toggle('on', b.dataset.ptype === ''));
  populateCats(); render();
});

document.getElementById('cat-sel').addEventListener('change', e => { curCat = e.target.value; render(); });

document.getElementById('ptype-grp').addEventListener('click', e => {
  const btn = e.target.closest('[data-ptype]'); if (!btn) return;
  document.querySelectorAll('#ptype-grp .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); curPtype = btn.dataset.ptype; render();
});

document.getElementById('filter-grp').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]'); if (!btn) return;
  const cls = { all:'on', refused:'on-refused', propaganda:'on-prop', censored:'on-cens', both:'on-both' };
  document.querySelectorAll('#filter-grp .fbtn').forEach(b =>
    b.classList.remove('on','on-refused','on-prop','on-cens','on-both'));
  btn.classList.add(cls[btn.dataset.f] || 'on');
  curFilter = btn.dataset.f; render();
});

// ── 啟動 ─────────────────────────────────────────────────────────────────
buildModelBar();
updateStats();
populateCats();
render();
</script>
</body>
</html>
