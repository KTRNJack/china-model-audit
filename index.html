<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中國 LLM 審查機制分析</title>
<style>
  :root {
    --bg: #0f1117; --surface: #1a1d27; --border: #2d3148;
    --text: #e2e8f0; --muted: #8892a4;
    --refused: #ef4444; --refused-bg: rgba(239,68,68,.1);
    --answered: #22c55e; --answered-bg: rgba(34,197,94,.1);
    --deflected: #f59e0b; --deflected-bg: rgba(245,158,11,.1);
    --propaganda: #a855f7; --propaganda-bg: rgba(168,85,247,.1);
    --accent: #6366f1; --thinking: #818cf8; --thinking-bg: rgba(129,140,248,.06);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; line-height: 1.6; }

  /* ── Header ── */
  header { padding: 20px 32px 0; border-bottom: 1px solid var(--border); }
  header h1 { font-size: 1.4rem; font-weight: 700; }
  header p  { color: var(--muted); font-size: .875rem; margin-top: 4px; }
  .method-note { margin-top: 8px; display: inline-block; font-size: .78rem; color: var(--muted);
    background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 6px 12px; }
  .method-note strong { color: var(--text); }
  .tabs { display: flex; margin-top: 14px; }
  .tab-btn { padding: 8px 20px; font-size: .9rem; background: transparent; border: none;
    color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent;
    transition: all .15s; white-space: nowrap; }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--accent); font-weight: 600; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* ── Model Comparison (Stats) ── */
  .model-comparison { padding: 16px 32px; border-bottom: 1px solid var(--border); }
  .stat-summary { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 14px; }
  .stat-summary-item { font-size: .82rem; color: var(--muted); }
  .stat-summary-item strong { color: var(--text); }
  .stat-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
  .stat-table th { text-align: left; font-size: .7rem; font-weight: 600; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em; padding: 4px 10px 6px 0;
    border-bottom: 1px solid var(--border); }
  .stat-table th:not(:first-child) { text-align: left; padding-left: 8px; }
  .stat-table tr:last-child td { border-bottom: none; }
  .stat-table td { padding: 6px 10px 6px 0; border-bottom: 1px solid rgba(45,49,72,.5); vertical-align: middle; }
  .stat-model-cell { display: flex; align-items: center; gap: 7px; white-space: nowrap; min-width: 140px; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .stat-cell { display: flex; align-items: center; gap: 6px; padding-left: 8px; }
  .stat-n { font-size: .82rem; font-weight: 600; min-width: 20px; }
  .stat-bar { flex: 1; min-width: 40px; max-width: 90px; height: 4px; background: rgba(255,255,255,.08); border-radius: 2px; overflow: hidden; }
  .stat-bar > div { height: 100%; border-radius: 2px; transition: width .4s ease; }
  .stat-p { font-size: .7rem; color: var(--muted); min-width: 28px; }
  .stat-answered-cell { padding-left: 8px; font-size: .82rem; color: var(--answered); }
  .stat-pct-sm { font-size: .68rem; color: var(--muted); margin-left: 3px; }

  /* ── Toolbar (sticky) ── */
  .toolbar { position: sticky; top: 0; z-index: 20; background: var(--bg);
    display: flex; gap: 8px; align-items: center; padding: 10px 32px;
    border-bottom: 1px solid var(--border); flex-wrap: wrap; }
  .tlabel { font-size: .78rem; color: var(--muted); white-space: nowrap; }
  .tsep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 2px; }
  select { background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 4px 8px; border-radius: 6px; font-size: .82rem; cursor: pointer; }
  .bgroup { display: flex; gap: 3px; flex-wrap: wrap; }
  .fbtn { padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: .76rem; cursor: pointer;
    transition: all .15s; white-space: nowrap; }
  .fbtn:hover { border-color: var(--accent); color: var(--text); }
  .fbtn.on         { background: var(--accent);        border-color: var(--accent);        color: #fff; }
  .fbtn.on-refused { background: var(--refused-bg);    border-color: var(--refused);       color: var(--refused); }
  .fbtn.on-prop    { background: var(--propaganda-bg); border-color: var(--propaganda);    color: var(--propaganda); }
  .fbtn.on-cens    { background: var(--deflected-bg);  border-color: var(--deflected);     color: var(--deflected); }
  .fbtn.on-both    { background: var(--answered-bg);   border-color: var(--answered);      color: var(--answered); }
  #ptype-section { display: flex; align-items: center; gap: 8px; }
  #ptype-section.hidden { display: none; }

  /* ── Cards ── */
  #compare-pane main { padding: 20px 32px; max-width: 1600px; }
  #no-results { text-align: center; color: var(--muted); padding: 60px; display: none; }
  .cat-hdr { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted); margin: 28px 0 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
  .cat-hdr:first-child { margin-top: 0; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; margin-bottom: 7px; overflow: hidden; }
  .card.censored { border-left: 3px solid var(--deflected); }
  .card-hdr { padding: 11px 16px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
  .card-hdr:hover { background: rgba(255,255,255,.018); }
  .chevron { color: var(--muted); font-size: .8rem; flex-shrink: 0; margin-top: 3px; transition: transform .2s; }
  .card-hdr.open .chevron { transform: rotate(90deg); }
  .question { font-size: .9rem; flex: 1; line-height: 1.5; }
  .card-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
  .diverge-line { font-size: .7rem; color: var(--muted); white-space: nowrap; }
  .badges { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; }
  .badge { font-size: .66rem; font-weight: 600; padding: 2px 5px; border-radius: 4px; white-space: nowrap; border: 1px solid; }
  .badge.REFUSED    { background: var(--refused-bg);    color: var(--refused);    border-color: rgba(239,68,68,.3); }
  .badge.ANSWERED   { background: var(--answered-bg);   color: var(--answered);   border-color: rgba(34,197,94,.3); }
  .badge.DEFLECTED  { background: var(--deflected-bg);  color: var(--deflected);  border-color: rgba(245,158,11,.3); }
  .badge.PROPAGANDA { background: var(--propaganda-bg); color: var(--propaganda); border-color: rgba(168,85,247,.3); }
  .badge.sm { font-size: .6rem; padding: 1px 4px; }
  .ptype-badge { font-size: .63rem; font-weight: 700; padding: 2px 5px; border-radius: 4px; border: 1px solid; flex-shrink: 0; }
  .ptype-word     { color: #a78bfa; border-color: rgba(167,139,250,.4); background: rgba(167,139,250,.1); }
  .ptype-sentence { color: #38bdf8; border-color: rgba(56,189,248,.4);  background: rgba(56,189,248,.1);  }
  .ptype-english  { color: #fb923c; border-color: rgba(251,146,60,.4);  background: rgba(251,146,60,.1);  }
  .ptype-japanese { color: #f472b6; border-color: rgba(244,114,182,.4); background: rgba(244,114,182,.1); }
  .card-body { display: none; border-top: 1px solid var(--border); }
  .card-body.open { display: block; }

  /* ── Family tabs ── */
  .family-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg); overflow-x: auto; }
  .ftab { padding: 7px 13px; background: transparent; border: none; border-bottom: 2px solid transparent;
    color: var(--muted); cursor: pointer; font-size: .76rem; display: flex; align-items: center; gap: 5px;
    transition: all .15s; white-space: nowrap; flex-shrink: 0; }
  .ftab:hover { color: var(--text); background: rgba(255,255,255,.02); }
  .ftab.active { color: var(--text); border-bottom-color: var(--accent); }

  /* ── Response panes ── */
  .response-grid { display: grid; }
  .response-pane { padding: 14px 16px; font-size: .84rem; line-height: 1.7; border-right: 1px solid var(--border); }
  .response-pane:last-child { border-right: none; }
  .pane-label { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin-bottom: 8px; display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
  .resp-text { white-space: pre-wrap; word-break: break-word; }
  details.think { margin-top: 10px; border-top: 1px solid var(--border); padding-top: 8px; }
  details.think summary { font-size: .7rem; color: var(--thinking); cursor: pointer;
    list-style: none; display: flex; align-items: center; gap: 6px; }
  details.think summary::-webkit-details-marker { display: none; }
  details.think summary::before { content: "▶"; font-size: .6rem; transition: transform .2s; }
  details.think[open] summary::before { transform: rotate(90deg); }
  .think-body { margin-top: 6px; font-size: .78rem; color: var(--muted); white-space: pre-wrap;
    word-break: break-word; background: var(--thinking-bg); border-left: 2px solid var(--thinking);
    padding: 8px 12px; border-radius: 0 4px 4px 0; }
  .cens-banner { background: rgba(245,158,11,.08); border-top: 1px solid rgba(245,158,11,.2);
    padding: 7px 16px; font-size: .73rem; color: var(--deflected); }

  /* ── 審查地圖 ── */
  #map-pane { padding: 20px 32px; }
  #map-pane h2 { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
  #map-pane .sub { font-size: .8rem; color: var(--muted); margin-bottom: 16px; }
  .map-scroll { overflow-x: auto; }
  .map-table { border-collapse: collapse; font-size: .83rem; }
  .map-table th, .map-table td { padding: 7px 10px; border: 1px solid var(--border);
    text-align: center; vertical-align: middle; }
  .map-table thead th { background: var(--surface); position: sticky; top: 0; z-index: 2; }
  .map-table th.q-col { text-align: left; min-width: 220px; max-width: 320px;
    position: sticky; left: 0; z-index: 3; background: var(--surface); }
  .map-table td.q-cell { text-align: left; font-size: .81rem; color: var(--text);
    position: sticky; left: 0; z-index: 1; background: var(--bg); }
  .map-table .cat-row td { background: var(--surface); font-size: .68rem; font-weight: 700;
    text-transform: uppercase; letter-spacing: .1em; color: var(--muted); text-align: left; }
  .col-hdr { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .col-hdr .co { font-size: .63rem; color: var(--muted); }
  .col-hdr .mn { font-size: .72rem; font-weight: 600; display: flex; align-items: center; gap: 4px; }
  .col-sz { font-size: .58rem; background: rgba(255,255,255,.1); padding: 1px 4px; border-radius: 3px; }
  .map-cell { font-size: 1rem; min-width: 60px; }
  .map-cell.REFUSED    { background: var(--refused-bg); }
  .map-cell.PROPAGANDA { background: var(--propaganda-bg); }
  .map-cell.DEFLECTED  { background: var(--deflected-bg); }
  .map-cell.ANSWERED   { background: var(--answered-bg); }
  .map-cell.NONE       { color: var(--muted); font-size: .72rem; }
  .map-table th.fam-sep, .map-table td.fam-sep { border-left: 2px solid rgba(255,255,255,.14); }
  .consist-cell { font-size: .7rem; min-width: 64px; color: var(--muted); }
  .consist-fam  { color: var(--deflected) !important; font-weight: 600; }
  .consist-diff { color: var(--refused)   !important; font-weight: 600; }

  @media (max-width: 768px) {
    .response-grid { grid-template-columns: 1fr !important; }
    header, .toolbar, .model-comparison, #compare-pane main, #no-results, #map-pane
      { padding-left: 16px; padding-right: 16px; }
    .stat-bar { min-width: 28px; }
  }
</style>
</head>
<body>

<header>
  <h1>中國 LLM 審查機制分析</h1>
  <p>比較原版模型（有審查訓練）與去審查版（Abliterated）對敏感問題的回應差異</p>
  <div class="method-note">
    <strong>方法論：</strong>「審查確認」= 原版拒答／迴避，且去審查版正常作答。兩者皆拒答（如有害內容）不計入審查差異。
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="compare">題目比較</button>
    <button class="tab-btn" data-tab="map">審查地圖</button>
  </div>
</header>

<div class="model-comparison" id="model-comparison"></div>

<!-- ── 題目比較 Tab ── -->
<div id="compare-pane" class="tab-pane active">
  <div class="toolbar">
    <span class="tlabel">來源：</span>
    <div class="bgroup" id="src-grp">
      <button class="fbtn on" data-src="">全部</button>
      <button class="fbtn" data-src="semantic">語意測試</button>
      <button class="fbtn" data-src="words">詞彙觸發</button>
    </div>
    <div class="tsep"></div>
    <span class="tlabel">類別：</span>
    <select id="cat-sel"><option value="">全部</option></select>
    <div id="ptype-section" class="hidden">
      <div class="tsep"></div>
      <span class="tlabel">類型：</span>
      <div class="bgroup" id="ptype-grp">
        <button class="fbtn on" data-ptype="">全部</button>
        <button class="fbtn" data-ptype="word">單詞</button>
        <button class="fbtn" data-ptype="sentence">句子</button>
        <button class="fbtn" data-ptype="english">英文</button>
        <button class="fbtn" data-ptype="japanese">日文</button>
      </div>
    </div>
    <div class="tsep" style="margin-left:auto"></div>
    <div class="bgroup" id="filter-grp">
      <button class="fbtn on"         data-f="all">全部</button>
      <button class="fbtn on-refused" data-f="refused">拒答</button>
      <button class="fbtn on-prop"    data-f="propaganda">宣傳</button>
      <button class="fbtn on-cens"    data-f="censored">審查確認</button>
      <button class="fbtn on-both"    data-f="both">兩者皆答</button>
    </div>
  </div>
  <main id="main"></main>
  <div id="no-results">沒有符合條件的結果</div>
</div>

<!-- ── 審查地圖 Tab ── -->
<div id="map-pane" class="tab-pane">
  <h2>審查地圖</h2>
  <p class="sub">僅顯示語意測試（semantic）結果 · 🚫 拒答 · ↩ 迴避 · 📢 宣傳 · ✅ 正常作答 · — 無資料</p>
  <div class="map-scroll"><div id="map-container"></div></div>
</div>

<script src="data/all_data.js"></script>
<script>
// META 和 DATA 由 all_data.js 注入

// ── Tab 切換 ──────────────────────────────────────────────────────────
let mapBuilt = false;
document.querySelector('.tabs').addEventListener('click', e => {
  const btn = e.target.closest('.tab-btn'); if (!btn) return;
  const tab = btn.dataset.tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.toggle('active', p.id === tab + '-pane'));
  if (tab === 'map' && !mapBuilt) { buildMap(); mapBuilt = true; }
});

// ── 狀態 ──────────────────────────────────────────────────────────────
let curSrc = '', curCat = '', curPtype = '', curFilter = 'all';
const mainEl = document.getElementById('main');
const noEl   = document.getElementById('no-results');

// ── 輔助 ──────────────────────────────────────────────────────────────
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const LABEL = { REFUSED:'🚫 拒答', ANSWERED:'✅ 已答', DEFLECTED:'↩ 迴避', PROPAGANDA:'📢 宣傳' };
const ICON  = { REFUSED:'🚫', ANSWERED:'✅', DEFLECTED:'↩️', PROPAGANDA:'📢' };
const labelTxt = l => LABEL[l] || l || '?';

// 衍生簡短模型標籤（DS 7B / Q 14B 等）
function shortLabel(modelKey) {
  const m = META.models[modelKey];
  if (!m) return modelKey;
  const n = m.name;
  if (n.includes('DeepSeek')) return 'DS '  + (n.match(/\d+B/)||['?'])[0];
  if (n.includes('Qwen'))     return 'Q '   + (n.match(/\d+B/)||['?'])[0];
  return n.split(' ').slice(-1)[0];
}

// ── 模型家族（censored + neutral + abliterated pair）──────────────────
function buildFamilies() {
  const neutralKeys = Object.keys(META.models).filter(k => META.models[k].role === 'neutral');
  return Object.entries(META.models)
    .filter(([, m]) => m.role === 'censored')
    .map(([key, info]) => {
      const members = [key, ...neutralKeys];
      if (info.pair && META.models[info.pair]) members.push(info.pair);
      return { key, company: info.company||'', label: info.name, dot: info.dot, members };
    });
}
const FAMILIES = buildFamilies();

// ── 篩選條件 ──────────────────────────────────────────────────────────
function isCensored(r)    { return Object.values(r.censored||{}).some(Boolean); }
function isRefused(r)     { return Object.entries(META.models).some(([m,i]) => i.role==='censored' && r.responses[m]?.label==='REFUSED'); }
function isPropaganda(r)  { return Object.entries(META.models).some(([m,i]) => i.role==='censored' && r.responses[m]?.label==='PROPAGANDA'); }
function isBothAnswered(r){ return Object.entries(META.models).some(([m,i]) => i.role==='censored' && i.pair && r.responses[m]?.label==='ANSWERED' && r.responses[i.pair]?.label==='ANSWERED'); }

// ── 分歧摘要（卡片右側一行小字）────────────────────────────────────────
function divergeSummary(r) {
  const fams = FAMILIES.filter(f => r.responses[f.key]);
  if (!fams.length) return '';
  const labels = fams.map(f => r.responses[f.key].label);
  if (new Set(labels).size === 1) {
    const l = labels[0];
    return `全 ${ICON[l]||''} ${labelTxt(l).replace(/^[^\s]+\s/,'')}`;
  }
  return fams.map(f => `${shortLabel(f.key)} ${ICON[r.responses[f.key].label]||'?'}`).join(' · ');
}

// ── 模型比較統計表 ────────────────────────────────────────────────────
function buildModelStats() {
  const container = document.getElementById('model-comparison');
  const semData = DATA.filter(r => r._src === 'semantic');

  const stats = {};
  FAMILIES.forEach(f => {
    const entries = semData.filter(r => r.responses[f.key]);
    if (!entries.length) return;
    const total = entries.length;
    stats[f.key] = {
      total,
      refused:    entries.filter(r => r.responses[f.key]?.label === 'REFUSED').length,
      propaganda: entries.filter(r => r.responses[f.key]?.label === 'PROPAGANDA').length,
      censored:   entries.filter(r => r.censored[f.key]).length,
      answered:   entries.filter(r => r.responses[f.key]?.label === 'ANSWERED').length,
    };
  });

  const keys = Object.keys(stats);
  if (!keys.length) { container.innerHTML = ''; return; }

  const maxR = Math.max(...keys.map(k => stats[k].refused));
  const maxP = Math.max(...keys.map(k => stats[k].propaganda));
  const maxC = Math.max(...keys.map(k => stats[k].censored));

  const topOf = fn => [...keys].sort((a,b) => fn(b) - fn(a))[0];
  const topRefused = topOf(k => stats[k].refused);
  const topProp    = topOf(k => stats[k].propaganda);
  const topOpen    = topOf(k => stats[k].answered);

  const summaryHtml = `<div class="stat-summary">
    <span class="stat-summary-item">最常拒答：<strong>${META.models[topRefused]?.name || '—'}</strong></span>
    <span class="stat-summary-item">宣傳最多：<strong>${META.models[topProp]?.name    || '—'}</strong></span>
    <span class="stat-summary-item">最開放：<strong>${META.models[topOpen]?.name      || '—'}</strong></span>
  </div>`;

  const rows = FAMILIES.filter(f => stats[f.key]).map(f => {
    const s = stats[f.key];
    const m = META.models[f.key];
    const pct = n => Math.round(n / s.total * 100);
    const bar = (n, max, color) => `
      <div class="stat-cell">
        <span class="stat-n" style="color:${color}">${n}</span>
        <div class="stat-bar"><div style="width:${max ? Math.round(n/max*100) : 0}%;background:${color}"></div></div>
        <span class="stat-p">${pct(n)}%</span>
      </div>`;
    return `<tr>
      <td><div class="stat-model-cell">
        <span class="dot" style="background:${m.dot}"></span>
        <span>${m.name}</span>
      </div></td>
      <td>${bar(s.refused,    maxR, 'var(--refused)')}</td>
      <td>${bar(s.propaganda, maxP, 'var(--propaganda)')}</td>
      <td>${bar(s.censored,   maxC, 'var(--deflected)')}</td>
      <td class="stat-answered-cell">${s.answered}<span class="stat-pct-sm">${pct(s.answered)}%</span></td>
    </tr>`;
  }).join('');

  container.innerHTML = `${summaryHtml}
    <table class="stat-table">
      <thead><tr>
        <th>模型（語意測試）</th>
        <th>🚫 拒答</th>
        <th>📢 宣傳</th>
        <th>⚠️ 審查確認</th>
        <th>✅ 正常作答</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── 過濾 ──────────────────────────────────────────────────────────────
function filtered() {
  return DATA.filter(r => {
    if (curSrc   && r._src       !== curSrc)   return false;
    if (curCat   && r.category   !== curCat)   return false;
    if (curPtype && r.probe_type !== curPtype) return false;
    if (curFilter === 'refused')    return isRefused(r);
    if (curFilter === 'propaganda') return isPropaganda(r);
    if (curFilter === 'censored')   return isCensored(r);
    if (curFilter === 'both')       return isBothAnswered(r);
    return true;
  });
}

// ── 類別 dropdown ────────────────────────────────────────────────────
function populateCats() {
  const base = curSrc ? DATA.filter(r => r._src === curSrc) : DATA;
  const cats = [...new Set(base.map(r => r.category).filter(Boolean))].sort();
  const sel = document.getElementById('cat-sel');
  sel.innerHTML = '<option value="">全部</option>';
  cats.forEach(c => { const o = document.createElement('option'); o.value = c; o.textContent = c; sel.appendChild(o); });
}

// ── 單一回應 pane ─────────────────────────────────────────────────────
function renderPane(side, m) {
  if (!side) return '';
  const thinkHtml = side.thinking
    ? `<details class="think"><summary>🧠 思考過程</summary><div class="think-body">${esc(side.thinking)}</div></details>`
    : '';
  return `<div class="response-pane">
    <div class="pane-label">
      <span class="dot" style="background:${m.dot}"></span>
      <span>${m.name}</span>
      <span class="badge ${side.label}">${labelTxt(side.label)}</span>
    </div>
    <div class="resp-text">${esc(side.response) || '（無回應）'}</div>
    ${thinkHtml}
  </div>`;
}

// ── 主渲染（題目比較）────────────────────────────────────────────────
function render() {
  const results = filtered();
  const hasPtype = results.some(r => r.probe_type);
  document.getElementById('ptype-section').classList.toggle('hidden', !hasPtype);

  mainEl.innerHTML = '';
  if (!results.length) { noEl.style.display = 'block'; return; }
  noEl.style.display = 'none';

  const ptypeLabel = { word:'單詞', sentence:'句子', english:'EN', japanese:'JP' };

  const byCat = {};
  results.forEach(r => { const k = r.category || '（未分類）'; (byCat[k] = byCat[k]||[]).push(r); });

  Object.entries(byCat).forEach(([cat, items]) => {
    const h = document.createElement('div');
    h.className = 'cat-hdr'; h.textContent = cat; mainEl.appendChild(h);

    items.forEach(r => {
      const card = document.createElement('div');
      card.className = 'card' + (isCensored(r) ? ' censored' : '');

      const activeFams = FAMILIES.filter(f => f.members.some(m => r.responses[m]));
      const multiFamily = activeFams.length > 1;

      const ptypeBadge = r.probe_type
        ? `<span class="ptype-badge ptype-${r.probe_type}">${ptypeLabel[r.probe_type]||r.probe_type}</span>` : '';
      const divSum = divergeSummary(r);

      const hdr = document.createElement('div');
      hdr.className = 'card-hdr';
      hdr.innerHTML = `<span class="chevron">▶</span>
        <span class="question">${esc(r.question)}</span>
        <div class="card-meta">
          ${divSum ? `<span class="diverge-line">${divSum}</span>` : ''}
          <div class="badges">${ptypeBadge}</div>
        </div>`;

      const body = document.createElement('div');
      body.className = 'card-body';

      let bodyHtml = '';

      if (multiFamily) {
        bodyHtml += `<div class="family-tabs">`;
        bodyHtml += activeFams.map((f, i) => {
          const icon = ICON[r.responses[f.key]?.label] || '';
          return `<button class="ftab${i===0?' active':''}" data-fkey="${f.key}">
            <span class="dot" style="background:${f.dot}"></span>
            <span>${esc(shortLabel(f.key))}</span>
            ${icon ? `<span>${icon}</span>` : ''}
          </button>`;
        }).join('');
        bodyHtml += `</div>`;
      }

      activeFams.forEach((f, i) => {
        const shown = !multiFamily || i === 0;
        const presentMembers = f.members.filter(m => r.responses[m]);
        bodyHtml += `<div class="family-pane" data-fkey="${f.key}"${shown ? '' : ' style="display:none"'}>
          <div class="response-grid" style="grid-template-columns:repeat(${presentMembers.length},1fr)">
            ${presentMembers.map(m => renderPane(r.responses[m], META.models[m])).join('')}
          </div>
          ${r.censored[f.key] ? '<div class="cens-banner">⚠️ 審查確認：原版拒答／迴避，去審查版正常作答</div>' : ''}
        </div>`;
      });

      body.innerHTML = bodyHtml;
      hdr.addEventListener('click', () => {
        const open = body.classList.toggle('open');
        hdr.classList.toggle('open', open);
      });
      body.addEventListener('click', e => {
        const ftab = e.target.closest('.ftab');
        if (!ftab) return;
        e.stopPropagation();
        const fkey = ftab.dataset.fkey;
        body.querySelectorAll('.ftab').forEach(t => t.classList.toggle('active', t.dataset.fkey === fkey));
        body.querySelectorAll('.family-pane').forEach(p => {
          p.style.display = p.dataset.fkey === fkey ? '' : 'none';
        });
      });

      card.appendChild(hdr); card.appendChild(body); mainEl.appendChild(card);
    });
  });
}

// ── 審查地圖 ──────────────────────────────────────────────────────────
function buildMap() {
  const rows = DATA.filter(r => r._src === 'semantic');

  // 欄位依公司排序（同家族相鄰），公司內依模型名排序
  const censoredModels = Object.entries(META.models)
    .filter(([, info]) => info.role === 'censored')
    .sort((a, b) => {
      const co = (a[1].company||'').localeCompare(b[1].company||'');
      if (co !== 0) return co;
      return (a[1].name||'').localeCompare(b[1].name||'');
    });

  if (!censoredModels.length || !rows.length) {
    document.getElementById('map-container').innerHTML = '<p style="color:var(--muted);padding:20px">尚無資料</p>';
    return;
  }

  // 一致性計算
  function consistency(r) {
    const labels = censoredModels.map(([m]) => r.responses[m]?.label).filter(Boolean);
    if (!labels.length) return { text: '—', cls: '' };
    const unique = new Set(labels);
    if (unique.size === 1) return { text: '全一致', cls: '' };

    // 判斷是否為家族內部一致但家族間分歧
    const byCompany = {};
    censoredModels.forEach(([m, info]) => {
      if (!r.responses[m]) return;
      const co = info.company || '?';
      (byCompany[co] = byCompany[co] || new Set()).add(r.responses[m].label);
    });
    const internalConsist = Object.values(byCompany).every(s => s.size === 1);
    if (internalConsist && Object.keys(byCompany).length > 1) {
      return { text: '家族分歧', cls: 'consist-fam' };
    }
    return { text: '各異', cls: 'consist-diff' };
  }

  // 欄位 header（換公司加分隔線）
  let prevCo = null;
  const colHeadersFinal = censoredModels.map(([, m]) => {
    const isNew = m.company !== prevCo && prevCo !== null;
    prevCo = m.company;
    const sz = (m.name.match(/\d+B/)||[''])[0];
    const base = m.name.replace(/\s*\d+B\s*/g,'').trim();
    return `<th${isNew ? ' class="fam-sep"' : ''}>
      <div class="col-hdr">
        <span class="co">${m.company||''}</span>
        <span class="mn"><span class="dot" style="background:${m.dot}"></span>${base}<span class="col-sz">${sz}</span></span>
      </div>
    </th>`;
  });

  const thead = `<thead><tr>
    <th class="q-col">題目</th>
    ${colHeadersFinal.join('')}
    <th style="min-width:68px;font-size:.68rem;color:var(--muted)">一致性</th>
  </tr></thead>`;

  const byCat = {};
  rows.forEach(r => { const k = r.category || '（未分類）'; (byCat[k] = byCat[k]||[]).push(r); });

  let tbody = '<tbody>';
  Object.entries(byCat).forEach(([cat, items]) => {
    tbody += `<tr class="cat-row"><td colspan="${censoredModels.length + 2}">${cat}</td></tr>`;
    items.forEach(r => {
      const c = consistency(r);
      tbody += `<tr><td class="q-cell">${esc(r.question)}</td>`;
      prevCo = null;
      censoredModels.forEach(([model, info]) => {
        const isNew = info.company !== prevCo && prevCo !== null;
        prevCo = info.company;
        const resp = r.responses[model];
        const cls = (resp ? resp.label : 'NONE') + (isNew ? ' fam-sep' : '');
        const content = resp ? (ICON[resp.label]||'?') : '—';
        const title = resp ? labelTxt(resp.label) : '無資料';
        tbody += `<td class="map-cell ${cls}" title="${title}">${content}</td>`;
      });
      tbody += `<td class="consist-cell ${c.cls}">${c.text}</td>`;
      tbody += '</tr>';
    });
  });
  tbody += '</tbody>';

  document.getElementById('map-container').innerHTML =
    `<table class="map-table">${thead}${tbody}</table>`;
}

// ── 事件綁定 ──────────────────────────────────────────────────────────
document.getElementById('src-grp').addEventListener('click', e => {
  const btn = e.target.closest('[data-src]'); if (!btn) return;
  document.querySelectorAll('#src-grp .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  curSrc = btn.dataset.src; curCat = ''; curPtype = '';
  document.getElementById('cat-sel').value = '';
  document.querySelectorAll('#ptype-grp .fbtn').forEach(b => b.classList.toggle('on', b.dataset.ptype === ''));
  populateCats(); render();
});

document.getElementById('cat-sel').addEventListener('change', e => { curCat = e.target.value; render(); });

document.getElementById('ptype-grp').addEventListener('click', e => {
  const btn = e.target.closest('[data-ptype]'); if (!btn) return;
  document.querySelectorAll('#ptype-grp .fbtn').forEach(b => b.classList.remove('on'));
  btn.classList.add('on'); curPtype = btn.dataset.ptype; render();
});

document.getElementById('filter-grp').addEventListener('click', e => {
  const btn = e.target.closest('[data-f]'); if (!btn) return;
  const cls = { all:'on', refused:'on-refused', propaganda:'on-prop', censored:'on-cens', both:'on-both' };
  document.querySelectorAll('#filter-grp .fbtn').forEach(b =>
    b.classList.remove('on','on-refused','on-prop','on-cens','on-both'));
  btn.classList.add(cls[btn.dataset.f] || 'on');
  curFilter = btn.dataset.f; render();
});

// ── 啟動 ──────────────────────────────────────────────────────────────
buildModelStats();
populateCats();
render();
</script>
</body>
