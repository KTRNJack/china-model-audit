<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中國 LLM 審查機制分析</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- 全文 Modal -->
<div id="resp-modal">
  <div id="resp-modal-box">
    <div id="resp-modal-head">
      <span id="resp-modal-title"></span>
      <span id="resp-modal-chars"></span>
      <button id="resp-modal-close" title="關閉">✕</button>
    </div>
    <div id="resp-modal-body"></div>
  </div>
</div>

<header>
  <h1>中國 LLM 審查機制分析</h1>
  <p>比較原版模型（有審查訓練）與去審查版（Abliterated）對敏感問題的回應差異</p>
  <div class="method-note">
    <strong>方法論：</strong>「審查確認」= 原版拒答／迴避，且去審查版正常作答。兩者皆拒答（如有害內容）不計入審查差異。
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="compare">題目比較</button>
    <button class="tab-btn" data-tab="map">審查地圖</button>
  </div>
</header>

<div class="model-comparison" id="model-comparison"></div>

<!-- 題目比較 Tab -->
<div id="compare-pane" class="tab-pane active">
  <div class="toolbar">
    <span class="tlabel">來源：</span>
    <div class="bgroup" id="src-grp">
      <button class="fbtn on" data-src="">全部</button>
      <button class="fbtn" data-src="semantic">語意測試</button>
      <button class="fbtn" data-src="words">詞彙觸發</button>
    </div>
    <div class="tsep"></div>
    <span class="tlabel">類別：</span>
    <select id="cat-sel"><option value="">全部</option></select>
    <div id="ptype-section" class="hidden">
      <div class="tsep"></div>
      <span class="tlabel">類型：</span>
      <div class="bgroup" id="ptype-grp">
        <button class="fbtn on" data-ptype="">全部</button>
        <button class="fbtn" data-ptype="word">單詞</button>
        <button class="fbtn" data-ptype="sentence">句子</button>
        <button class="fbtn" data-ptype="english">英文</button>
        <button class="fbtn" data-ptype="japanese">日文</button>
      </div>
    </div>
    <div class="tsep" style="margin-left:auto"></div>
    <div class="bgroup" id="filter-grp">
      <button class="fbtn on"         data-f="all">全部</button>
      <button class="fbtn on-refused" data-f="refused">拒答</button>
      <button class="fbtn on-prop"    data-f="propaganda">宣傳</button>
      <button class="fbtn on-cens"    data-f="censored">審查確認</button>
      <button class="fbtn on-both"    data-f="both">兩者皆答</button>
    </div>
  </div>
  <main id="main"></main>
  <div id="no-results">沒有符合條件的結果</div>
</div>

<!-- 審查地圖 Tab -->
<div id="map-pane" class="tab-pane">
  <h2>審查地圖</h2>
  <p class="sub">僅顯示語意測試（semantic）結果 · 🚫 拒答 · ↩ 迴避 · 📢 宣傳 · ✅ 正常作答 · — 無資料</p>
  <div class="map-scroll"><div id="map-container"></div></div>
</div>

<script src="data/all_data.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
